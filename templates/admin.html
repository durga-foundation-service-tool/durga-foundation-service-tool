<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
}

h1 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

th {
    background: #4facfe;
    color: white;
}

tr:hover {
    background: #f1f1f1;
}

input {
    padding: 5px;
    width: 80px;
}

button {
    padding: 6px 10px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}
</style>

</head>
<body>

<h1>Admin Panel</h1>

<table>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Service</th>
    <th>Details</th>
    <th>Price</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
    <td>{{ row[6] }}</td>

    <td>
        <form action="/set-price/{{ row[0] }}" method="POST">
            <input type="number" name="price" placeholder="₹">
            <button type="submit">Set</button>
        </form>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
